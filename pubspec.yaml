name: rhema
description: >
  A local-first, privacy-focused Bible app with audio playlists
  and real-time karaoke-style verse highlighting. Powered by
  on-device AI voice synthesis via Piper ONNX.

publish_to: none

version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  sqflite: ^2.3.3+1
  path_provider: ^2.1.5
  path: ^1.9.1

  just_audio: ^0.10.3
  audio_service: ^0.18.17

  get_it: ^8.0.3
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.15
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/bibles/
    - assets/fonts/
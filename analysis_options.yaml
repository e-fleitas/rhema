# analysis_options.yaml
#
# Reglas de análisis estático para el proyecto Rhema.
# El analizador de Dart las aplica en tiempo real en VSCode
# y en el pipeline de CI/CD.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Tratar estas categorías como errores, no como advertencias.
  errors:
    # Uso de await en funciones no-async: error de lógica real.
    unawaited_futures: error
    # Imports no utilizados: mantiene el código limpio.
    unused_import: error
    # Variables locales declaradas pero nunca usadas.
    unused_local_variable: warning
    # Parámetros no utilizados en funciones.
    unused_element: warning

  exclude:
    # Excluir código autogenerado por drift y build_runner.
    # Estos archivos los genera la máquina, no los escribimos nosotros.
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # ── Estilo y legibilidad ──────────────────────────────────────────
    # Preferir const donde sea posible: reduce reconstrucciones de widgets.
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true

    # Preferir constructores con nombre para mayor claridad.
    prefer_named_parameters: false  # No forzamos, pero lo recomendamos.

    # Siempre declarar tipos de retorno en funciones públicas.
    always_declare_return_types: true

    # ── Seguridad y correctitud ───────────────────────────────────────
    # Evitar print() en producción. Usaremos un logger estructurado.
    avoid_print: true

    # Evitar retornos de tipo dynamic en APIs públicas.
    avoid_dynamic_calls: true

    # Siempre manejar los casos en un switch exhaustivo.
    exhaustive_cases: true

    # ── Convenciones de Dart ──────────────────────────────────────────
    # Usar super parameters (sintaxis moderna de Dart 3).
    use_super_parameters: true

    # Preferir expresiones de función para lambdas simples.
    prefer_expression_function_bodies: false  # Solo cuando mejore legibilidad.

    # Ordenar constructores antes que otros miembros de la clase.
    sort_constructors_first: true